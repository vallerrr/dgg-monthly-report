<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DGG Monthly Report</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>DGG Monthly Report</h1>
      <p class="muted">Static GitHub Pages dashboard for monthly subnational highlights</p>
    </header>

    <section class="cards" id="summary-cards"></section>

    <section class="controls">
      <label>
        Outcome
        <select id="outcome-filter"></select>
      </label>
      <label>
        Search GID
        <input id="gid-filter" type="text" placeholder="e.g. USA.1_1" />
      </label>
      <label>
        Min predicted change
        <input id="delta-filter" type="number" step="0.01" value="0" />
      </label>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>GID</th>
            <th>Outcome</th>
            <th>Current</th>
            <th>12m Avg</th>
            <th>Change</th>
            <th>% Change</th>
            <th>Significant (12m)</th>
          </tr>
        </thead>
        <tbody id="rows-table"></tbody>
      </table>
    </section>

    <footer class="footer" id="footer-meta"></footer>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
